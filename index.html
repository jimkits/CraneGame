<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>3D Crane Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }

    #score {
      position: absolute; z-index: 10;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      font-size: 30px;
      color: #fff;
      text-shadow: 0 0 10px #ff00cc, 0 0 25px #ff00cc;
      font-weight: bold;
      letter-spacing: 3px;
      pointer-events: none;
    }

    #message {
      position: absolute; z-index: 10;
      top: 42%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 42px;
      color: #ffe600;
      text-shadow: 0 0 20px #ff8800, 0 0 40px #ff4400;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    #message.show { opacity: 1; }

    #controls {
      position: absolute; z-index: 10;
      bottom: 18px; left: 20px;
      color: #aaa;
      font-size: 13px;
      line-height: 2;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.50);
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.07);
    }
    #controls b { color: #eee; }

    #drop-hint {
      position: absolute; z-index: 10;
      bottom: 18px; right: 20px;
      color: #aaffaa;
      font-size: 13px;
      text-align: right;
      pointer-events: none;
      line-height: 1.6;
    }


    #version {
      position: absolute; z-index: 10;
      bottom: 18px; left: 50%;
      transform: translateX(-50%);
      color: #333;
      font-size: 11px;
      letter-spacing: 1px;
      pointer-events: none;
    }

    /* ── Mobile touch controls ── */
    #mobile-controls {
      display: none;
      position: absolute; z-index: 20;
      bottom: 24px; left: 0; right: 0;
      padding: 0 20px;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: none;
    }

    @media (pointer: coarse) {
      #mobile-controls { display: flex; }
      #controls { display: none; }
    }

    #dpad { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .dpad-row { display: flex; gap: 6px; align-items: center; }
    .dpad-gap { width: 60px; height: 60px; }

    .dpad-btn, .action-btn {
      width: 60px; height: 60px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.28);
      border-radius: 12px;
      color: #fff;
      font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: auto;
      user-select: none; -webkit-user-select: none;
      touch-action: none;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      transition: background 0.1s;
    }
    .dpad-btn:active { background: rgba(255,255,255,0.32); }

    #action-btns { display: flex; flex-direction: column; gap: 14px; align-items: center; }

    #btn-drop {
      width: 82px; height: 82px;
      font-size: 15px; font-weight: bold; letter-spacing: 1px;
      background: rgba(255,50,50,0.35);
      border-color: rgba(255,110,110,0.65);
      color: #ffaaaa;
      border-radius: 50%;
    }
    #btn-drop:active { background: rgba(255,50,50,0.65); }

    #btn-view {
      font-size: 11px; letter-spacing: 1px;
    }
    #btn-view.active { background: rgba(100,180,255,0.35); border-color: rgba(140,200,255,0.7); color: #aaddff; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "@dimforge/rapier3d-compat": "https://unpkg.com/@dimforge/rapier3d-compat@0.12.0/rapier.es.js"
    }
  }
  </script>
</head>
<body>
  <div id="score">SCORE: 0</div>
  <div id="message"></div>
  <div id="controls">
    <b>W / ↑</b> Forward &nbsp; <b>S / ↓</b> Back<br>
    <b>A / ←</b> Left &nbsp;&nbsp;&nbsp; <b>D / →</b> Right<br>
    <b>SPACE</b> Drop Claw<br>
    <b>L-SHIFT</b> Side view<br>
    <b>VERSION</b> v1.1.0
  </div>

  <div id="mobile-controls">
    <div id="dpad">
      <button class="dpad-btn" id="btn-up">▲</button>
      <div class="dpad-row">
        <button class="dpad-btn" id="btn-left">◀</button>
        <div class="dpad-gap"></div>
        <button class="dpad-btn" id="btn-right">▶</button>
      </div>
      <button class="dpad-btn" id="btn-down">▼</button>
    </div>
    <div id="action-btns">
      <button class="action-btn" id="btn-view">VIEW</button>
      <button class="action-btn" id="btn-drop">DROP</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
